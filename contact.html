		<div class="pop-box">

			<div class="two-pop">

		<div class="container">
			<!-- 顶部导航栏 -->
			<div class="top-nav">

					<div class="logo">

			<!-- 内容区域 -->
			<div class="wrapper">
				<div class="top-box">
					03: Get in touch!
				</div>
				<div class="more-title">
					contact me now
				</div>
				<div class="submit-content">
					<div class="left-form">
						<div class="form-email">
							<input type="email" placeholder="Email">
						</div>
						<div class="form-email">
								<input type="email" placeholder="Email">
						</div>
						<div class="form-messgae">
							<textarea name="" id="" cols="6" rows="10" placeholder="Enter your message"></textarea>
						</div>
						<div class="submit-btn">
							send
						</div>
					</div>
					<div class="right-card">
						<div class="card-box">
							<div class="card-box-left">
								<div class="card-box-ms1">
									Wechat: Jia_20020417
								</div>
								<div class="card-box-ms2">
									Mobile: 12345678901
								</div>
								<div class="card-box-ms3">
									Looking forward to your contact with me !
								</div>
							</div>
							<div class="card-box-right">
								<img src="./assets/images/avatar.png" alt="头像">
							</div>
						</div>
						<div class="card-message">
							<p>
								Anything you want to know?
								Just come and chat!
							</p>
						</div>
					</div>
				</div>

						SongTT

		<script type="text/javascript" src="vanilla-tilt.js"></script>
		<script type="text/javascript">
			VanillaTilt.init(document.querySelector(".card-box"), {
				max: 25,
				speed: 400
			});
			
			//It also supports NodeList
			VanillaTilt.init(document.querySelectorAll(".card-box"));
		</script>
